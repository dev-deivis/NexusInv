spring:
    datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver
        hikari:
            connection-timeout: 30000
            maximum-pool-size: 5

    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false

    flyway:
        enabled: true
        baseline-on-migrate: true

logging:
    level:
        com.david.inventory: INFO
        org.hibernate.SQL: WARN
