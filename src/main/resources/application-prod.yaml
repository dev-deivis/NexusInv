spring:
  datasource:
    # Forzamos los parámetros aquí para que la variable en Render sea más simple
    url: ${DB_URL}?sslmode=require&binaryTransfer=true&reWriteBatchedInserts=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 2 # Reducimos para ahorrar memoria en capa gratis
      minimum-idle: 1
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Optimización para evitar consultas innecesarias de metadatos
        temp:
          use_jdbc_metadata_defaults: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

logging:
  level:
    root: INFO
    com.david.inventory: INFO
    org.hibernate.SQL: ERROR
